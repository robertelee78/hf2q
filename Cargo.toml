[package]
name = "hf2q"
version = "0.1.0"
edition = "2021"
rust-version = "1.81.0"
description = "Pure Rust CLI for converting HuggingFace models to hardware-optimized formats"
license = "Apache-2.0"
repository = "https://github.com/robertelee78/hf2q"

[features]
default = []
# Enable RuVector self-learning
ruvector = ["dep:ruvector-core"]
# GPU acceleration backends
metal = ["candle-core/metal", "candle-nn/metal"]
cuda = ["candle-core/cuda", "candle-nn/cuda"]

[dependencies]
safetensors = "0.7"
half = "2.4"

# HuggingFace integration
hf-hub = "0.5"

# Self-learning intelligence — optional
ruvector-core = { version = "2.1", optional = true }

# CLI framework
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"

# Performance
rayon = "1.10"
memmap2 = "0.9"

# UX
indicatif = "0.17"
console = "0.15"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
anyhow = "1"
thiserror = "2"

# GPU compute (Candle)
candle-core = "0.10"
candle-nn = "0.10"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }

# System info
sysinfo = "0.32"

# File locking (unix)
libc = "0.2"

# Signal handling
ctrlc = { version = "3.4", features = ["termination"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "quantize_bench"
harness = false

[[bench]]
name = "shard_read_bench"
harness = false

