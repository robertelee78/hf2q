#
# Vendored candle-nn for hf2q.
#
# Source: candle-nn-0.10.2 from crates.io
#   registry: github.com/huggingface/candle tag 0.10.2
# Local patch: src/ops.rs — fix SDPA Metal dispatch offset bug.
#   See the header comment in src/ops.rs for the full analysis and
#   upstream line references.
#
# The package version stays exactly 0.10.2 so that `[patch.crates-io]`
# will substitute it for the registry crate (cargo rejects prerelease
# suffixes here because they sort below the release version, and
# rejects higher versions because hf2q's `candle-nn = "0.10"` dep spec
# caps at <0.11). The override is still visible in `cargo tree`, which
# renders vendored crates with the path suffix. The crate is consumed
# by hf2q through a `[patch.crates-io]` entry in /opt/hf2q/Cargo.toml.
#
# This file is hand-written (not the registry-normalized Cargo.toml).
# Do not `cargo vendor` over it — that will clobber the patch-version
# bump and the standalone dependency pins.
#

[package]
name = "candle-nn"
version = "0.10.2"
edition = "2021"
description = "Minimalist ML framework (vendored with hf2q SDPA offset fix)."
repository = "https://github.com/huggingface/candle"
keywords = ["blas", "tensor", "machine-learning"]
categories = ["science"]
license = "MIT OR Apache-2.0"
readme = "README.md"

[lib]
name = "candle_nn"
path = "src/lib.rs"

[dependencies]
accelerate-src = { version = "0.3.2", optional = true }
candle = { version = "0.10.2", package = "candle-core" }
candle-metal-kernels = { version = "0.10.2", optional = true }
half = { version = "2.5.0", features = ["num-traits", "use-intrinsics", "rand_distr"] }
intel-mkl-src = { version = "0.8.1", features = ["mkl-static-lp64-iomp"], optional = true }
libc = "0.2.147"
num-traits = "0.2.15"
objc2-metal = { version = "0.3.1", optional = true }
rayon = "1.7.0"
safetensors = "0.7.0"
serde = { version = "1.0.171", features = ["derive"] }
thiserror = "2"

[dev-dependencies]
anyhow = { version = "1", features = ["backtrace"] }
clap = { version = "4.2.4", features = ["derive"] }
criterion = { version = "0.8", default-features = false }
rand = "0.9.0"
rand_distr = "0.5.1"

[features]
default = []
accelerate = ["dep:accelerate-src", "candle/accelerate"]
cuda = ["candle/cuda"]
cudnn = ["candle/cudnn"]
mkl = ["dep:intel-mkl-src", "candle/mkl"]
metal = ["candle/metal", "dep:candle-metal-kernels", "dep:objc2-metal"]

[[bench]]
name = "bench_main"
harness = false
